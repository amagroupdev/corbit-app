name: orbit_app
description: "ORBIT SMS V3 - Mobile Application"
publish_to: 'none'
version: 1.0.0+19

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: any
  riverpod_annotation: any

  # Networking
  dio: any
  pretty_dio_logger: any

  # Storage
  flutter_secure_storage: any
  shared_preferences: any

  # Navigation
  go_router: any

  # UI
  cupertino_icons: any
  flutter_svg: any
  cached_network_image: any
  shimmer: any
  pin_code_fields: any
  flutter_staggered_animations: any
  badges: any

  # Forms & Validation
  reactive_forms: any

  # File handling
  file_picker: any
  image_picker: any
  share_plus: any
  path_provider: any
  open_filex: any

  # Contacts
  flutter_contacts: any

  # Utilities
  intl: any
  url_launcher: any
  connectivity_plus: any
  package_info_plus: any
  permission_handler: any
  infinite_scroll_pagination: any
  pull_to_refresh_flutter3: any
  webview_flutter: any
  flutter_markdown: any
  flutter_local_notifications: any
  wakelock_plus: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  riverpod_generator: any
  build_runner: any
  json_serializable: any
  flutter_launcher_icons: any

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/orbit-icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/orbit-icon.png"
  web:
    generate: true
    image_path: "assets/images/orbit-icon.png"
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/pdf/
    - assets/rag/
    - assets/prompts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
